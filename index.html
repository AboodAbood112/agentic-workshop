<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #334155;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --accent3: #ede9fe;
    --green: #4ade80;
    --green-bg: #052e16;
    --border: #334155;
    --border2: #475569;
    --r: 10px;
    --r2: 6px;
  }
  body {
    font-family:
      system-ui,
      -apple-system,
      sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  a {
    color: inherit;
    text-decoration: none;
  }

  /* NAV */
  nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .nav-logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent2);
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-pill {
    background: var(--bg3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .progress-pill span {
    color: var(--green);
    font-weight: 600;
  }

  /* HERO */
  .hero {
    padding: 3rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--accent2), #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: var(--text2);
    font-size: 14px;
    max-width: 500px;
    margin: 0 auto 1.5rem;
  }
  .hero-bar {
    width: 100%;
    max-width: 400px;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    margin: 0 auto;
    overflow: hidden;
  }
  .hero-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .hero-stat {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* SECTION LABEL */
  .sec-label {
    padding: 1.5rem 1.5rem 0.5rem;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sec-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    padding: 0 1.5rem 1rem;
  }

  /* CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1rem 1.1rem;
    cursor: pointer;
    transition:
      border-color 0.15s,
      transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
  }
  .card.done {
    border-color: #166534;
  }
  .card.done::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 3px;
    height: 100%;
    background: var(--green);
  }
  .card.active {
    border-color: var(--accent);
  }
  .card.active::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .num-badge {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .nb-done {
    background: var(--green-bg);
    color: var(--green);
  }
  .nb-active {
    background: #2e1065;
    color: var(--accent2);
  }
  .nb-locked {
    background: var(--bg3);
    color: var(--text3);
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }
  .card-class {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 2px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .tag {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--text2);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text3);
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .d-done {
    background: var(--green);
  }
  .d-active {
    background: var(--accent2);
  }
  .d-locked {
    background: var(--border2);
  }
  .btn-open {
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--text2);
    cursor: pointer;
  }
  .btn-open:hover {
    background: var(--bg3);
  }

  /* PANEL */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .panel-overlay.open {
    display: flex;
  }
  .panel {
    background: var(--bg);
    border-right: 1px solid var(--border);
    width: 100%;
    max-width: 860px;
    height: 100vh;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  .panel-top {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .panel-title-area {
    flex: 1;
  }
  .panel-class {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 3px;
  }
  .panel-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .panel-close {
    background: var(--bg3);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    flex-shrink: 0;
  }
  .panel-body {
    padding: 1.25rem;
    flex: 1;
  }

  .p-section {
    margin-bottom: 1.4rem;
  }
  .p-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.6rem;
  }
  .learn-list {
    list-style: none;
  }
  .learn-list li {
    font-size: 13px;
    color: var(--text2);
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    align-items: flex-start;
    line-height: 1.45;
  }
  .learn-list li::before {
    content: "▸";
    color: var(--accent2);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .takeaway-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-right: 3px solid var(--accent);
    border-radius: var(--r2);
    padding: 0.8rem 1rem;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  /* Content tabs */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 1rem;
    background: var(--bg2);
    border-radius: 6px;
    padding: 3px;
  }
  .tab-btn {
    flex: 1;
    padding: 6px;
    font-size: 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text2);
    background: transparent;
  }
  .tab-btn.active {
    background: var(--bg3);
    color: var(--text);
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }

  /* Level content styles */
  .lv-content {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }
  .lv-content h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
    margin: 1rem 0 0.4rem;
    border-right: 3px solid var(--accent);
    padding-right: 0.5rem;
  }
  .lv-content p {
    margin-bottom: 0.6rem;
  }
  .lv-content ul {
    padding-right: 1.2rem;
    margin-bottom: 0.6rem;
  }
  .lv-content li {
    margin: 0.25rem 0;
  }
  .lv-content code {
    background: var(--bg3);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    color: #a3e635;
    font-family: monospace;
  }
  .lv-content .note {
    background: var(--bg2);
    border-right: 3px solid #f59e0b;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    margin: 0.6rem 0;
    font-size: 12px;
    color: #fbbf24;
  }

  /* Actions */
  .panel-actions {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    position: sticky;
    bottom: 0;
    background: var(--bg);
  }
  .btn-done {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex: 1;
  }
  .btn-done:hover {
    background: #6d28d9;
  }
  .btn-done.undone {
    background: var(--bg3);
    color: var(--text2);
  }
  .btn-done.undone:hover {
    background: var(--bg2);
  }
  .btn-ask {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
  }
  .btn-ask:hover {
    background: var(--bg3);
  }

  /* Mobile Responsive Styles */
  @media (max-width: 768px) {
    .panel { width: 100%; max-width: 100%; height: 100vh; right: -100%; border-radius: 0; }
    .panel.open { right: 0; }
    .grid { padding: 0 1rem 1rem; }
    .hero { padding: 2rem 1rem 1.5rem; }
    .sec-label { padding: 1.5rem 1rem 0.5rem; }
    
    /* Touch-friendly buttons */
    .btn-done, .btn-ask, .tab-btn, .panel-close { min-height: 44px; display: flex; align-items: center; justify-content: center; }
  }

  @media (max-width: 480px) {
    nav { flex-direction: column; align-items: flex-start; gap: 10px; padding: 1rem; }
    .nav-right { width: 100%; justify-content: space-between; }
    
    .hero h1 { font-size: 22px; }
    .hero p { font-size: 13px; }
    
    .grid { grid-template-columns: 1fr; }
    
    .panel-actions { flex-direction: column; }
    .btn-done, .btn-ask { width: 100%; flex: none; }
  }
</style>

  const sections_ar = [
    "Class 1 — الأساس",
    "Class 1 — الجودة",
    "Class 1 — التركيب",
    "Class 2 — الاستقلالية",
    "Class 3 — التنسيق",
  ];
  const sections_en = [
    "Class 1 — Foundation",
    "Class 1 — Quality",
    "Class 1 — Composition",
    "Class 2 — Autonomy",
    "Class 3 — Coordination"
  ];
  let done = new Set(JSON.parse(localStorage.getItem("adw_done") || "[]"));
  let cur = null;
  let lang = localStorage.getItem('workshop_lang') || 'ar';

  function toggleLang() {
    lang = lang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('workshop_lang', lang);
    applyLang();
  }

  function applyLang() {
    const dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.body.dir = dir;
    document.getElementById('panel').dir = dir;
    const t = translations[lang];
    document.querySelector('.lang-toggle').textContent = lang === 'ar' ? 'EN' : 'عربي';
    document.getElementById('lbl-completed').textContent = t.completed;
    document.getElementById('lbl-hero-sub').textContent = t.heroSubtitle;
    document.getElementById('lbl-close').textContent = t.close;
    document.getElementById('lbl-overview').textContent = t.overview;
    document.getElementById('lbl-content').textContent = t.content;
    document.getElementById('lbl-learn').textContent = t.whatYouWillLearn;
    document.getElementById('lbl-take').textContent = t.keyTakeaway;
    document.getElementById('lbl-explain').textContent = t.explainMore;
    const fileLink = document.getElementById('p-file-link');
    if(fileLink) fileLink.textContent = t.openPage;

    if (cur && document.getElementById("overlay").classList.contains("open")) {
      updatePanelContent(cur);
    }
    render();
  }

  function save() {
    try {
      localStorage.setItem("adw_done", JSON.stringify([...done]));
    } catch (e) {}
  }

  function updateProgress() {
    const p = Math.round((done.size / 12) * 100);
    document.getElementById("hfill").style.width = p + "%";
    document.getElementById("done-count").textContent = done.size;
    const t = translations[lang];
    document.getElementById("hstat").textContent =
      done.size === 12
        ? t.workshopCompleted
        : done.size === 0
          ? t.startFromLevel1
          : `${12 - done.size} ${t.levelsRemaining}`;
  }

  function render() {
    const app = document.getElementById("app");
    let html = "";
    const sections = lang === 'ar' ? sections_ar : sections_en;
    const t = translations[lang];
    
    sections.forEach((sec) => {
      const grp = levels.filter((l) => (lang === 'ar' ? l.sec : l.sec_en) === sec);
      html += `<div class="sec-label">${sec}</div><div class="grid">`;
      grp.forEach((l) => {
        const d = done.has(l.id),
          a = !d;
        const cc = d ? "card done" : a ? "card active" : "card";
        const nb = d ? "nb-done" : a ? "nb-active" : "nb-locked";
        const dc = d ? "d-done" : a ? "d-active" : "d-locked";
        const st = d ? t.completed : t.available;
        html += `<div class="${cc}" onclick="openPanel(${l.id})">
        <div class="card-header">
          <div class="num-badge ${nb}">${l.id}</div>
          <div class="card-info"><div class="card-class">${l.cls}</div><div class="card-title">${l.title}</div></div>
        </div>
        <div class="tags">${l.tags.map((tg) => `<span class="tag">${tg}</span>`).join("")}</div>
        <div class="card-footer">
          <div class="status"><div class="dot ${dc}"></div>${st}</div>
          <button class="btn-open" onclick="event.stopPropagation();openPanel(${l.id})">${lang === 'ar' ? 'فتح' : 'Open'}</button>
        </div>
      </div>`;
      });
      html += "</div>";
    });
    app.innerHTML = html;
    updateProgress();
  }

  function switchTab(name, btn) {
    document
      .querySelectorAll(".tab-btn")
      .forEach((b) => b.classList.remove("active"));
    document
      .querySelectorAll(".tab-content")
      .forEach((t) => t.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + name).classList.add("active");
  }

  function updatePanelContent(level) {
    document.getElementById("p-class").textContent = level.cls;
    document.getElementById("p-title").textContent =
      `Level ${level.id}: ${level.title}`;
    const p_learn = lang === 'ar' ? level.learn : level.learn_en;
    document.getElementById("p-learn").innerHTML = p_learn
      .map((x) => `<li>${x}</li>`)
      .join("");
    document.getElementById("p-take").textContent = lang === 'ar' ? level.take : level.take_en;
    const iframe = document.getElementById("p-content");
    const noScrollbarCSS =
      "::-webkit-scrollbar{display:none}body{scrollbar-width:none;-ms-overflow-style:none}";
    iframe.onload = function () {
      try {
        const s = iframe.contentDocument.createElement("style");
        s.textContent = noScrollbarCSS;
        iframe.contentDocument.head.appendChild(s);
      } catch (e) {}
    };
    
    // Load appropriate file based on language
    const fileToLoad = lang === 'ar' ? level.file : level.file.replace('_rtl.html', '_en.html');
    iframe.src = fileToLoad;
    iframe.removeAttribute("srcdoc");
    
    updateDoneBtn();
    const link = document.getElementById("p-file-link");
    link.href = fileToLoad;
    link.style.display = "";
  }

  function openPanel(id) {
    cur = levels.find((l) => l.id === id);
    if (!cur) return;
    updatePanelContent(cur);
    document.querySelectorAll(".tab-btn")[0].click();
    document.getElementById("overlay").classList.add("open");
  }

  function updateDoneBtn() {
    if (!cur) return;
    const btn = document.getElementById("p-done-btn");
    const t = translations[lang];
    if (done.has(cur.id)) {
      btn.textContent = t.completedUndo;
      btn.classList.add("undone");
    } else {
      btn.textContent = t.markComplete;
      btn.classList.remove("undone");
    }
  }

  function toggleCurrentDone() {
    if (!cur) return;
    if (done.has(cur.id)) done.delete(cur.id);
    else done.add(cur.id);
    save();
    updateDoneBtn();
    render();
  }

  function askAboutCurrent() {
    if (!cur) return;
    const msg = lang === 'ar' 
        ? `اشرحلي Level ${cur.id}: ${cur.title} من workshop agentic engineering بالتفصيل`
        : `Explain Level ${cur.id}: ${cur.title} from the agentic engineering workshop in detail`;
    if(typeof sendPrompt === 'function') sendPrompt(msg);
  }

  function closePanel() {
    document.getElementById("overlay").classList.remove("open");
  }

  document.getElementById("overlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("overlay")) closePanel();
  });

  applyLang();
</script>
